<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="82%">
      <stop offset="0%" stop-color="#203560"/>
      <stop offset="42%" stop-color="#0e1a34"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff0c9"/>
      <stop offset="38%" stop-color="#f6ce7d"/>
      <stop offset="72%" stop-color="#d99e39"/>
      <stop offset="100%" stop-color="#a56d18"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="52%" stop-color="#ffe1a0"/>
      <stop offset="100%" stop-color="#e7b45a"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd93" stop-opacity="0.72"/>
      <stop offset="44%" stop-color="#f0b95f" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#f0b95f" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- faint starfield -->
  <g fill="#cfe0ff">
    <circle cx="196" cy="232" r="2.4" opacity="0.42"/>
    <circle cx="832" cy="196" r="2.8" opacity="0.5"/>
    <circle cx="760" cy="360" r="1.8" opacity="0.3"/>
    <circle cx="268" cy="792" r="2.2" opacity="0.36"/>
    <circle cx="828" cy="812" r="2.0" opacity="0.32"/>
    <circle cx="150" cy="520" r="1.8" opacity="0.28"/>
  </g>
  <g transform="translate(512 488)">
    <circle r="360" fill="url(#halo)"/>
    <circle r="312" fill="none" stroke="url(#g)" stroke-width="3" opacity="0.42"/>
    <circle r="286" fill="none" stroke="url(#g)" stroke-width="1.4" opacity="0.28"/>
    <!-- compass star: the Word going out to the four corners -->
    <g fill="url(#g)">
      <path d="M0,-306 L30,-46 L0,0 L-30,-46 Z"/>
      <path d="M0,306 L30,46 L0,0 L-30,46 Z"/>
      <path d="M306,0 L46,30 L0,0 L46,-30 Z"/>
      <path d="M-306,0 L-46,30 L0,0 L-46,-30 Z"/>
      <g transform="rotate(45)" opacity="0.88">
        <path d="M0,-206 L21,-42 L0,0 L-21,-42 Z"/>
        <path d="M0,206 L21,42 L0,0 L-21,42 Z"/>
        <path d="M206,0 L42,21 L0,0 L42,-21 Z"/>
        <path d="M-206,0 L-42,21 L0,0 L-42,-21 Z"/>
      </g>
    </g>
    <!-- open book / codex at the foot -->
    <g transform="translate(0 188)" opacity="0.96">
      <path d="M-158,44 C-102,10 -34,6 0,26 C34,6 102,10 158,44 L158,60 C102,26 34,22 0,42 C-34,22 -102,26 -158,60 Z" fill="url(#g)"/>
      <path d="M0,26 L0,42" stroke="#a56d18" stroke-width="2" opacity="0.6"/>
    </g>
    <!-- the core light: the Word -->
    <circle r="58" fill="url(#core)" filter="url(#soft)" opacity="0.9"/>
    <circle r="52" fill="url(#core)"/>
    <circle r="15" fill="#fffdf6"/>
  </g>
</svg>
